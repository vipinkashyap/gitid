name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build CLI binaries for all platforms
  build-cli:
    name: CLI - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: macos-aarch64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # Cross-compilation support for aarch64-linux
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p gitid-cli

      - name: Build credential helper
        run: cargo build --release --target ${{ matrix.target }} -p git-credential-gitid

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gitid dist/gitid-${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/git-credential-gitid dist/git-credential-gitid-${{ matrix.artifact }}
          chmod +x dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact }}
          path: dist/

  # Build Tauri desktop app
  build-desktop:
    name: Desktop - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # Linux dependencies for Tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          args: --target ${{ matrix.target }}

      - name: Collect desktop bundles
        run: |
          mkdir -p desktop-out
          find tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle \
            -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} desktop-out/ \; 2>/dev/null || true
          ls -la desktop-out/ || echo "No bundles found"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        if: hashFiles('desktop-out/*') != ''
        with:
          name: desktop-${{ matrix.platform }}
          path: desktop-out/*

  # Create GitHub Release with all artifacts
  release:
    name: Create Release
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # CLI binaries
          for dir in artifacts/cli-*; do
            [ -d "$dir" ] && find "$dir" -type f -exec cp {} release/ \;
          done
          # Desktop bundles
          for dir in artifacts/desktop-*; do
            [ -d "$dir" ] && find "$dir" -type f -exec cp {} release/ \;
          done
          echo "Release contents:"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
